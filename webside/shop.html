<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Web-based</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="navbar container">
            <a href="home.html" class="logo"><span>Visal</span>Shop</a>
            <nav class="nav-links">
                <a href="home.html">Home</a>
                <a href="shop.html" class="active">Shop</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="cart-icon" id="cart-icon">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="shop-container container">
        <aside class="filters">
            <h3>Filters</h3>
            <div class="filter-group">
                <h4>Category</h4>
                <button class="filter-btn active" onclick="filterCategory('all', this)">All Products</button>
                <button class="filter-btn" onclick="filterCategory('nike sneakers', this)">Nike Sneakers</button>
                <button class="filter-btn" onclick="filterCategory('nike cleats', this)">Nike Cleats</button>
            </div>
        </aside>

        <section class="shop-content">
            <div class="product-grid" id="shop-grid"></div>
        </section>
    </main>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header"><h3>Your Shopping Cart</h3><i class="fa-solid fa-xmark" id="close-cart"></i></div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total"><span>Subtotal:</span><span id="cart-total-price">$0.00</span></div>
            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>
    <div class="cart-overlay" id="cart-overlay"></div>

    <script src="script.js"></script>
    <script>
        displayShopProducts();
    </script>
</body>
</html>
